<html>
  <style>
    .search-bar{
      width: 30%;
      margin-left:30%;
    }
  </style>

<nav class="navbar navbar-expand-lg bg-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Shopping</a>
      
      <div class="search-bar">
        <form action="{% url 'searchproduct' %}" method="POST">
          {% csrf_token %}
        <div class="input-group">
          <input type="search" required class="form-control" name="productsearch" id="searchbar" placeholder="Search products">
          <button type="submit" class="input-group-text"><i class="fa fa-search"></i></button>
        </div>
      </form>
      </div>
     
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'home' %} active {% endif %}" aria-content="page" href="{% url 'home' %}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'collections' %} active {% endif %}" aria-content="page" href="{% url 'collections' %}">Collections</a>
          </li> 
            {% if request.user.is_authenticated %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            {{user.username}}
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#"></a></li>
              <li><a class="dropdown-item" href="#">Change password</a></li>
              <li><a class="dropdown-item" href="{% url 'myorders' %}">My Orders <i class="fa fa-shopping-cart"></i></a></li>
              <li><a class="dropdown-item" href="{% url 'wishlist' %}">My wishlist <i class="fa fa-heart"></i></a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="nav-link" href="{% url 'logout' %}">Logout <i class="fa fa-sign-out"></i></a></li>
            </ul>
          </li>
          {% else %}
          <li class="nav-item">
            <a class="nav-link active" href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="{% url 'register' %}">Register</a>
          </li>
          {% endif %}
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'cart' %} active {% endif %}" aria-content="page" href="{% url 'cart' %}">Cart<i class="fa fa-shopping-cart"></i></a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'wishlist' %} active {% endif %}" aria-content="page" href="{% url 'wishlist' %}">Wishlist<i class="fa fa-heart"></i></a>
          </li>
        </div>
      </div>
    </div>
  </nav>
  </html>
